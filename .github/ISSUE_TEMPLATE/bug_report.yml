name: Bug Report
description: Report a bug or issue with the Pantry app
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happens...
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Pantry Mobile/Desktop App Version
      description: What version of the Pantry mobile or desktop app are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: input
    id: web-app-version
    attributes:
      label: Pantry Web App Version
      description: What version of the Pantry web app are you using on your Nextcloud instance?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 📋 Debugging Information

        The following information helps us investigate and fix issues quickly. Please provide as much detail as possible.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        If applicable, add screenshots to help explain your problem.
        You can drag and drop images directly into this field.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., recent changes, specific configuration, workarounds attempted)
